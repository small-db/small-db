name: publish-book

on:
  push:
    branches: ["main"]
    paths:
      - "small-db-book/**"
      - ".github/workflows/publish-book.yml"
  workflow_dispatch:

# Permissions required for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs so
# an in-flight publish can finish before a new one starts.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        env:
          MDBOOK_VERSION: "0.4.40"
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build book
        run: mdbook build small-db-book

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: small-db-book/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
