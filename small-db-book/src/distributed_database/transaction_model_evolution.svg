<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1750" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="750" y="40" font-size="22" font-weight="bold" text-anchor="middle">
    Evolution of small-db's transaction model
  </text>
  <text x="750" y="68" font-size="14" text-anchor="middle" fill="#444" font-style="italic">
    Each decision introduces invariants. Subsequent decisions either build on them or are constrained by them.
  </text>

  <!-- Column headers -->
  <text x="370" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">DECISIONS</text>
  <text x="1170" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#666">INVARIANTS &amp; REQUIREMENTS</text>

  <!-- Subtle column dividers -->
  <line x1="40" y1="125" x2="700" y2="125" stroke="#ccc" stroke-width="1"/>
  <line x1="780" y1="125" x2="1460" y2="125" stroke="#ccc" stroke-width="1"/>

  <!-- ========================= STAGE 0 ========================= -->
  <rect x="40" y="155" width="660" height="95" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="370" y="186" font-size="16" font-weight="bold" text-anchor="middle">Stage 0 — Distributed KV, no concurrency control</text>
  <text x="370" y="213" font-size="13" text-anchor="middle">Writes hit storage immediately at wall-clock ts.</text>
  <text x="370" y="234" font-size="13" text-anchor="middle" fill="#b85450">No invariants. Anomalies everywhere.</text>

  <!-- transition 0 -> 1 -->
  <line x1="370" y1="250" x2="370" y2="335" stroke="#444" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="80" y="266" width="270" height="56" rx="5" fill="#f8cecc" stroke="#b85450"/>
  <text x="92" y="285" font-size="12"><tspan font-weight="bold">Problem.</tspan> Readers must wait for writers,</text>
  <text x="92" y="303" font-size="12">concurrent writes overwrite each other.</text>
  <rect x="390" y="266" width="290" height="56" rx="5" fill="#fff2cc" stroke="#d6b656"/>
  <text x="404" y="285" font-size="12"><tspan font-weight="bold">Insight.</tspan> A coherent past view is enough</text>
  <text x="404" y="303" font-size="12">for readers. Make writes append new versions.</text>

  <!-- ========================= STAGE 1 ========================= -->
  <rect x="40" y="335" width="660" height="115" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="370" y="366" font-size="16" font-weight="bold" text-anchor="middle">Stage 1 — MVCC</text>
  <text x="370" y="393" font-size="13" text-anchor="middle">Each write produces a new version tagged with ts.</text>
  <text x="370" y="414" font-size="13" text-anchor="middle">Reads filter by snapshot_ts and pick the latest visible per row.</text>
  <text x="370" y="438" font-size="12" text-anchor="middle" fill="#82b366" font-weight="bold">introduces I1, I2</text>

  <!-- Invariants I1, I2 -->
  <rect x="780" y="335" width="680" height="50" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="800" y="358" font-size="13"><tspan font-weight="bold">I1.</tspan> Each write produces a new immutable version. Rows are never overwritten.</text>
  <text x="800" y="376" font-size="11" fill="#666">— a per-row append-only chain of versions</text>
  <rect x="780" y="395" width="680" height="50" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="800" y="418" font-size="13"><tspan font-weight="bold">I2.</tspan> Read at snapshot_ts returns the largest version_ts ≤ snapshot_ts (per row).</text>
  <text x="800" y="436" font-size="11" fill="#666">— the &quot;lex-largest visible&quot; rule</text>

  <!-- transition 1 -> 2 -->
  <line x1="370" y1="450" x2="370" y2="535" stroke="#444" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="80" y="466" width="270" height="56" rx="5" fill="#f8cecc" stroke="#b85450"/>
  <text x="92" y="485" font-size="12"><tspan font-weight="bold">Problem.</tspan> Concurrent writers to the same</text>
  <text x="92" y="503" font-size="12">row both read the pre-image; one's effect lost.</text>
  <rect x="390" y="466" width="290" height="56" rx="5" fill="#fff2cc" stroke="#d6b656"/>
  <text x="404" y="485" font-size="12"><tspan font-weight="bold">Insight.</tspan> Writers to one row must serialize</text>
  <text x="404" y="503" font-size="12">so the second sees the first's commit.</text>

  <!-- ========================= STAGE 2 ========================= -->
  <rect x="40" y="535" width="660" height="115" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="370" y="566" font-size="16" font-weight="bold" text-anchor="middle">Stage 2 — Per-row exclusive lock + read-latest</text>
  <text x="370" y="593" font-size="13" text-anchor="middle">A writer locks the row, reads the latest committed value, computes, writes.</text>
  <text x="370" y="614" font-size="13" text-anchor="middle" fill="#666" font-style="italic">builds on I1 (chain is well-defined)</text>
  <text x="370" y="638" font-size="12" text-anchor="middle" fill="#82b366" font-weight="bold">introduces I3, I4</text>

  <!-- Invariants I3, I4 -->
  <rect x="780" y="535" width="680" height="50" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="800" y="558" font-size="13"><tspan font-weight="bold">I3.</tspan> At most one writer is in its RMW critical section on a single row at a time.</text>
  <text x="800" y="576" font-size="11" fill="#666">— two concurrent writers serialize</text>
  <rect x="780" y="595" width="680" height="50" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="800" y="618" font-size="13"><tspan font-weight="bold">I4.</tspan> Inside the lock, the writer reads the latest committed value (not a snapshot view).</text>
  <text x="800" y="636" font-size="11" fill="#666">— RMW always composes on real current state</text>

  <!-- transition 2 -> 3 -->
  <line x1="370" y1="650" x2="370" y2="735" stroke="#444" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="80" y="666" width="270" height="56" rx="5" fill="#f8cecc" stroke="#b85450"/>
  <text x="92" y="685" font-size="12"><tspan font-weight="bold">Problem.</tspan> A transfer is two writes at two ts.</text>
  <text x="92" y="703" font-size="12">A reader can land between them.</text>
  <rect x="390" y="666" width="290" height="56" rx="5" fill="#fff2cc" stroke="#d6b656"/>
  <text x="404" y="685" font-size="12"><tspan font-weight="bold">Insight.</tspan> One commit_ts must cover all of</text>
  <text x="404" y="703" font-size="12">a transaction's writes.</text>

  <!-- ========================= STAGE 3 ========================= -->
  <rect x="40" y="735" width="660" height="115" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="370" y="766" font-size="16" font-weight="bold" text-anchor="middle">Stage 3 — Multi-statement transactions, single commit_ts</text>
  <text x="370" y="793" font-size="13" text-anchor="middle">BEGIN buffers writes; COMMIT picks one ts and dispatches all at that ts.</text>
  <text x="370" y="814" font-size="13" text-anchor="middle" fill="#666" font-style="italic">builds on I1 (ts-addressable versions), I3 (no interleaving with other writers)</text>
  <text x="370" y="838" font-size="12" text-anchor="middle" fill="#82b366" font-weight="bold">introduces I5</text>

  <!-- Invariant I5 -->
  <rect x="780" y="755" width="680" height="60" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="800" y="780" font-size="13"><tspan font-weight="bold">I5.</tspan> Every write of one transaction lands at the same version_ts.</text>
  <text x="800" y="800" font-size="11" fill="#666">— a snapshot at any S either sees all of T's writes or none of them</text>

  <!-- transition 3 -> 4 -->
  <line x1="370" y1="850" x2="370" y2="945" stroke="#444" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="80" y="866" width="270" height="66" rx="5" fill="#f8cecc" stroke="#b85450"/>
  <text x="92" y="885" font-size="12"><tspan font-weight="bold">Problem.</tspan> Two concurrent commits on the</text>
  <text x="92" y="903" font-size="12">same row from different coordinators arrive</text>
  <text x="92" y="921" font-size="12">out of order; the later one is lex-shadowed.</text>
  <rect x="390" y="866" width="290" height="66" rx="5" fill="#fff2cc" stroke="#d6b656"/>
  <text x="404" y="885" font-size="12"><tspan font-weight="bold">Insight.</tspan> Observing a value should advance</text>
  <text x="404" y="903" font-size="12">my timestamp past it. The shadowed write</text>
  <text x="404" y="921" font-size="12">happened because that didn't happen.</text>

  <!-- ========================= STAGE 4 (tension) ========================= -->
  <rect x="40" y="945" width="660" height="180" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="370" y="976" font-size="16" font-weight="bold" text-anchor="middle">Stage 4 — A constraint that fights I5</text>
  <text x="60" y="1006" font-size="13"><tspan font-weight="bold">New requirement R1</tspan> would close shadowing.</text>
  <text x="60" y="1028" font-size="13">But naive enforcement breaks I5:</text>
  <text x="80" y="1052" font-size="12">• per-row bumping → each row independently bumped → I5 broken</text>
  <text x="80" y="1072" font-size="12">• rewrite all rows on push → preserves I5 → O(N) at commit, hot-path expensive</text>
  <text x="370" y="1100" font-size="13" text-anchor="middle" fill="#666" font-style="italic">depends on I5 (must keep), introduces R1 (must add)</text>

  <!-- Requirement R1 (different color: orange/amber, since it's a NEW constraint that threatens prior invariants) -->
  <rect x="780" y="945" width="680" height="65" rx="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="800" y="971" font-size="13"><tspan font-weight="bold">R1.</tspan> Each new commit's version_ts on every row it writes must strictly</text>
  <text x="800" y="989" font-size="13">exceed every prior version_ts on that row.</text>
  <text x="800" y="1006" font-size="11" fill="#666">— closes shadowed writes; clashes with I5 if enforced per-row</text>

  <!-- Tension callout -->
  <rect x="780" y="1030" width="680" height="80" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="800" y="1056" font-size="13" font-weight="bold">Tension between R1 and I5</text>
  <text x="800" y="1076" font-size="12">Per-row mechanisms can satisfy one but not both.</text>
  <text x="800" y="1094" font-size="12">We need a structure that lets a single commit_ts be raised at commit time,</text>
  <text x="800" y="1109" font-size="12" font-style="italic" fill="#666">without rewriting the rows that already carry the txn's writes.</text>

  <!-- transition 4 -> 5 -->
  <line x1="370" y1="1125" x2="370" y2="1220" stroke="#444" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <rect x="80" y="1141" width="270" height="66" rx="5" fill="#f8cecc" stroke="#b85450"/>
  <text x="92" y="1160" font-size="12"><tspan font-weight="bold">Tension.</tspan> Need (a) commit_ts &gt; all prior</text>
  <text x="92" y="1178" font-size="12">version_ts AND (b) one commit_ts per txn.</text>
  <text x="92" y="1196" font-size="12">Per-row mechanisms cannot satisfy both.</text>
  <rect x="390" y="1141" width="290" height="66" rx="5" fill="#fff2cc" stroke="#d6b656"/>
  <text x="404" y="1160" font-size="12"><tspan font-weight="bold">Insight.</tspan> Decouple &quot;the value sitting on</text>
  <text x="404" y="1178" font-size="12">this row&quot; from &quot;is this committed, at what ts.&quot;</text>
  <text x="404" y="1196" font-size="12">Move the second piece into one shared place.</text>

  <!-- ========================= STAGE 5 (the destination) ========================= -->
  <rect x="40" y="1220" width="660" height="280" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2.5"/>
  <text x="370" y="1252" font-size="16" font-weight="bold" text-anchor="middle">Stage 5 — Intents + txn record</text>

  <text x="60" y="1284" font-size="13">Each row write lays down an intent <tspan font-family="monospace">{value, txn_id}</tspan>;</text>
  <text x="60" y="1305" font-size="13">a separate txn record holds <tspan font-family="monospace">{status, commit_ts}</tspan>.</text>

  <text x="60" y="1338" font-size="13"><tspan font-weight="bold">COMMIT</tspan> = one update of the txn record. All N intents flip together.</text>
  <text x="60" y="1359" font-size="13"><tspan font-weight="bold">PUSH</tspan> = the same one update at a higher commit_ts.</text>
  <text x="60" y="1380" font-size="13"><tspan font-weight="bold">RESOLUTION</tspan> = lazy rewrite of intents to canonical version entries.</text>

  <text x="370" y="1420" font-size="13" text-anchor="middle" fill="#666" font-style="italic">depends on I5 (preserved), R1 (now satisfied)</text>
  <text x="370" y="1444" font-size="12" text-anchor="middle" fill="#82b366" font-weight="bold">introduces I6, I7</text>

  <text x="60" y="1480" font-size="12" fill="#557f3f">✓ Single commit_ts per txn (atomicity).  ✓ Push past existing versions without rewriting any rows.</text>

  <!-- Invariants I6, I7 -->
  <rect x="780" y="1220" width="680" height="60" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="800" y="1245" font-size="13"><tspan font-weight="bold">I6.</tspan> Each row's effective commit_ts and visibility status are determined by</text>
  <text x="800" y="1263" font-size="13">a single shared txn record, not by the row entry alone.</text>
  <rect x="780" y="1290" width="680" height="60" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="800" y="1315" font-size="13"><tspan font-weight="bold">I7.</tspan> Commit and push are single atomic updates of the txn record.</text>
  <text x="800" y="1333" font-size="13">Intent resolution is lazy and idempotent.</text>

  <!-- Dependency note -->
  <rect x="780" y="1370" width="680" height="100" rx="6" fill="#f4f4f4" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="800" y="1395" font-size="12" font-weight="bold">How the invariants compose at Stage 5:</text>
  <text x="800" y="1417" font-size="12">• I6 carries I5: all rows of one txn point to one record → one commit_ts. ✓</text>
  <text x="800" y="1435" font-size="12">• I7 carries R1: push raises the txn record's commit_ts in O(1), past prior versions. ✓</text>
  <text x="800" y="1453" font-size="12">• I3, I4 still hold (intents are still RMW under a row lock).</text>
  <text x="800" y="1465" font-size="11" fill="#666" font-style="italic"></text>

  <!-- Footer -->
  <text x="750" y="1530" font-size="13" font-style="italic" text-anchor="middle" fill="#444">
    Read top-to-bottom on the left for the decisions; read top-to-bottom on the right for the invariants
  </text>
  <text x="750" y="1551" font-size="13" font-style="italic" text-anchor="middle" fill="#444">
    each decision adds. Every later stage's text says which earlier invariants it relies on.
  </text>

</svg>
