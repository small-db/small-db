syntax = "proto3";

package small.execution;

// =====================================================================
// small-db protobuf
// =====================================================================
import "src/type/type.proto";

service Insert {
  rpc Insert(Row) returns (WriteResponse) {}
}

service Update {
  rpc Update(RawNode) returns (WriteResponse) {}
}

service Query {
  rpc Query(RawNode) returns (QueryResponse) {}
}

message Row {
  string table_name = 1;
  repeated string column_names = 2;
  repeated string column_values = 3;
  // Transaction timestamp (ms since epoch). Coordinator picks once per
  // statement and propagates so every row written by that statement
  // shares the same MVCC version.
  int64 ts = 4;
}

message RawNode {
  bytes packed_node = 1;
  // Transaction timestamp (ms since epoch). For writes (UPDATE) ts is
  // the *current* write_ts the coordinator believes; the row owner
  // may push it upward (see WriteResponse.final_write_ts). For reads
  // (SELECT) ts is the snapshot at which to evaluate the query.
  int64 ts = 2;
  // Identifier of the writing transaction. Embedded in the on-disk
  // intent so readers know which /_txn/<txn_id> record to resolve.
  // Zero for reads.
  int64 txn_id = 3;
  // gRPC endpoint of the coordinator that owns this txn's record.
  // Embedded in the intent. Empty for reads.
  string coordinator_addr = 4;
}

message WriteResponse {
  int64 affected_rows = 1;
  // The write_ts the row owner used when writing the intent. Equals
  // the request's `ts` unless the row's latest committed version was
  // already >= request `ts`, in which case the owner pushed it upward
  // to `latest + 1`. The coordinator takes max across all peers'
  // responses and updates the txn record on disk + in memory.
  int64 final_write_ts = 2;
}

message QueryResponse {
  // Arrow IPC stream bytes for a single RecordBatch (schema + data).
  bytes ipc_bytes = 1;
}
